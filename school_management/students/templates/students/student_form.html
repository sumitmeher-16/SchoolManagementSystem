{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}{{ action }} Student{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <i class="bi bi-person-plus me-2"></i>{{ action }} Student
    </div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% crispy form %}
        </form>
    </div>
</div>
{% endblock %}
