{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}Enroll Student{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <i class="bi bi-person-plus me-2"></i>Enroll Student
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% crispy form %}
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Enroll Student</button>
                <a href="{% url 'academics:class_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
