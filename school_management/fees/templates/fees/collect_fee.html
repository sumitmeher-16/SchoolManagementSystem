{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}Collect Fee{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <i class="bi bi-currency-dollar me-2"></i>Collect Fee
    </div>

        <form method="post">

        </form>
    </div>
</div>
{% endblock %}
