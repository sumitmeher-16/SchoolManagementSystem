{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}{{ action }} Exam{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <i class="bi bi-file-earmark-text me-2"></i>{{ action }} Exam
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% crispy form %}
        </form>
    </div>
</div>
{% endblock %}
