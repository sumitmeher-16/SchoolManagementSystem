services:
  - type: web
    name: school-management
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn school_management.wsgi --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: school-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: school-management.onrender.com

databases:
  - name: school-db
    databaseName: school_management
    user: school_user
    plan: free