{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}Assign Subject to Teacher{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <i class="bi bi-person-plus me-2"></i>Assign Subject to Teacher
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Teacher</label>
                <select name="teacher" class="form-select" required>
                    <option value="">Select Teacher</option>
                    {% for teacher in teachers %}
                    <option value="{{ teacher.id }}">{{ teacher.get_full_name }} ({{ teacher.username }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Subject</label>
                <select name="subject" class="form-select" required>
                    <option value="">Select Subject</option>
                    {% for subject in subjects %}
                    <option value="{{ subject.id }}">{{ subject.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Class</label>
                <select name="class_assigned" class="form-select" required>
                    <option value="">Select Class</option>
                    {% for class in classes %}
                    <option value="{{ class.id }}">{{ class.name }}-{{ class.section }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Assign</button>
                <a href="{% url 'teachers:teacher_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
