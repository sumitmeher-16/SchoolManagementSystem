{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}Bulk Attendance{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <i class="bi bi-clipboard-check me-2"></i>Bulk Attendance
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% crispy form %}
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Mark Attendance</button>
                <a href="{% url 'attendance:attendance_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
