{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}{{ action }} Fee Category{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <i class="bi bi-tags me-2"></i>{{ action }} Fee Category
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% crispy form %}
        </form>
    </div>
</div>
{% endblock %}
